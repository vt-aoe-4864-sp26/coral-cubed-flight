CONFIG_GPIO=y
CONFIG_SERIAL=y
CONFIG_UART_INTERRUPT_DRIVEN=n
CONFIG_FLASH=y
CONFIG_FLASH_PAGE_LAYOUT=y
CONFIG_FLASH_MAP=y

# UART
CONFIG_CLOCK_CONTROL_NRF_K32SRC_XTAL=y
CONFIG_BOOT_BANNER=n
CONFIG_EARLY_CONSOLE=n

# Optional DFU USB flashing
# CONFIG_BOOT_USB_DFU_WAIT=y
# CONFIG_BOOT_USB_DFU_WAIT_DELAY_MS=1000
# CONFIG_USB_DEVICE_PRODUCT="VT COM Board MCUboot"
# CONFIG_BOOT_SERIAL_USB_DFU_GPIO=n
# CONFIG_BOOT_SIGNATURE_TYPE_NONE=y
# CONFIG_SINGLE_APPLICATION_SLOT=y
# CONFIG_LOG=y

# Radio & IEEE
CONFIG_NETWORKING=y
CONFIG_NET_NATIVE=y
CONFIG_NET_IPV6=y
CONFIG_NET_UDP=y
CONFIG_NET_SOCKETS=y
CONFIG_NET_CONFIG_SETTINGS=y
CONFIG_NET_CONFIG_NEED_IPV6=y
CONFIG_HWINFO=y
#
CONFIG_NET_L2_IEEE802154=y
CONFIG_IEEE802154=y
CONFIG_IEEE802154_NRF5=y
CONFIG_NET_CONFIG_IEEE802154_CHANNEL=20
CONFIG_NET_CONFIG_IEEE802154_PAN_ID=0xABCD
#
CONFIG_NET_PKT_RX_COUNT=16
CONFIG_NET_PKT_TX_COUNT=16
CONFIG_NET_BUF_RX_COUNT=24
CONFIG_NET_BUF_TX_COUNT=24
CONFIG_NET_BUF_DATA_SIZE=128

# Avoid stack pressure when socket send/recv and USB logging overlap.
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048