# Absolute minimum for bare-metal blink
CONFIG_GPIO=y

# Use internal RC — reliable on cold boot, no crystal dependency
CONFIG_CLOCK_CONTROL_NRF_K32SRC_RC=y
CONFIG_CLOCK_CONTROL_NRF_K32SRC_500PPM=y

# Kill console entirely so no UART driver touches your pins
CONFIG_CONSOLE=n
CONFIG_UART_CONSOLE=n
CONFIG_PRINTK=n
CONFIG_LOG=n
CONFIG_BOOT_BANNER=n

# Stack sizes
CONFIG_MAIN_STACK_SIZE=2048