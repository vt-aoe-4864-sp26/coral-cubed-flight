# ==============================================================================
# CDH APPLICATION CONFIGURATION
# ==============================================================================

# --- BOARD-TO-BOARD COMMS (UART1, UART2, UART3) ---
# Required so your board can listen to other lanes without blocking the main loop
CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_RING_BUFFER=y

# --- USB VIRTUAL COM PORT IDENTITY (UART0) ---
CONFIG_USB_DEVICE_PRODUCT="Coral CDH Flight Board"
CONFIG_USB_DEVICE_VID=0x1209
CONFIG_USB_DEVICE_PID=0x0001
# We set this to 'n' so we can manually call usb_enable() in main.c and catch errors
CONFIG_USB_DEVICE_INITIALIZE_AT_BOOT=n

# --- PERIPHERAL DRIVERS (Match your devicetree) ---
CONFIG_I2C=y
CONFIG_SPI=y
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_ADC=y